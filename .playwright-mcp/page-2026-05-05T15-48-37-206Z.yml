      - heading "2. Status des Vermittlers nach Gewerbeordnung:" [level=2] [ref=e29]
      - paragraph [ref=e30]: Wir sind als Versicherungsmakler nach § 34d Abs. 1 der Gewerbeordnung tätig und im Vermittlerregister unter der Nummer D-KQ7W-92T3Y-75 registriert.
      - heading "3. Bei Interesse können Sie die Angaben bei der Registerstelle überprüfen:" [level=2] [ref=e31]
      - paragraph [ref=e32]:
        - text: Deutsche Industrie- und Handelskammer (DIHK)
        - text: Breite Straße 29
        - text: 10178 Berlin
        - text: "Tel.: 0180-600-585-0*"
        - text: "* 20 Cent/Anruf aus dem deutschen Festnetz"
        - link "http://www.vermittlerregister.info" [ref=e33] [cursor=pointer]:
          - /url: http://www.vermittlerregister.info
      - heading "4. Schlichtungsstellen für außergerichtliche Streitbeilegung:" [level=2] [ref=e34]
      - paragraph [ref=e35]:
        - text: Versicherungsombudsmann e.V.
        - text: Postfach 08 06 32
        - text: 10006 Berlin
      - paragraph [ref=e36]:
        - text: Ombudsmann private Kranken- und Pflegeversicherung
        - text: Postfach 06 02 22
        - text: 10052 Berlin
      - heading "5." [level=2] [ref=e37]
      - paragraph [ref=e38]: Der Vermittler hält keine unmittelbare oder mittelbare Beteiligung von mehr als 10 % der Stimmrechte oder des Kapitals an einem Versicherungsunternehmen.
      - heading "6." [level=2] [ref=e39]
      - paragraph [ref=e40]: Ein Versicherungsunternehmen hält keine mittelbare oder unmittelbare Beteiligung von mehr als 10 % der Stimmrechte oder des Kapitals am Versicherungsmakler.
      - heading "7." [level=2] [ref=e41]
      - paragraph [ref=e42]: Der Vermittler erhält für die Vermittlung von Versicherungsverträgen eine Courtage des Produktgebers. Eine gesonderte Vergütung durch den Kunden wird nicht geschuldet.
      - paragraph [ref=e43]: Sofern die Vergütung aufgrund der Wünsche und Bedürfnisse durch den Kunden erfolgt, wird hierfür eine separate Vergütungsvereinbarung getroffen.
      - heading "8." [level=2] [ref=e44]
      - paragraph [ref=e45]: Die Tätigkeit beinhaltet auch Beratung.
      - heading "9." [level=2] [ref=e46]
      - paragraph [ref=e47]: Es werden in regelmäßigen Intervallen die Produktanbieter sondiert. Hierbei wird mit Produktanbietern, welche dem Makler Informationen zur Produktinformationen zur Verfügung stellen, eine Vermittlungsvereinbarung geschlossen. Es werden nur Versicherer berücksichtigt, die in Deutschland zum Vertrieb zugelassen sind bzw. der Aufsicht der Bundesanstalt für Finanzdienstleistungsaufsicht unterliegen, ihren Sitz oder eine Niederlassung in der Bundesrepublik Deutschland haben und die Vertragsbedingungen in deutscher Sprache anbieten.
      - paragraph [ref=e48]: Auf Wunsch wird Ihnen eine aktuelle Liste der kooperierenden Versicherer zur Verfügung gestellt.
