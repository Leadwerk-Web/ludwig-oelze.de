        - generic [ref=e42]: Stand Mai 2026
        - heading "Liebe Mandantinnen und Mandanten" [level=2] [ref=e43]
        - paragraph [ref=e44]: Ich starte ein Pilotprojekt, um meinen Kundenservice effizienter und strukturierter zu gestalten. Mein Ziel ist es, Dir nicht nur gute Beratung, sondern auch klare und einfache Prozesse für Deine Anliegen zu bieten.
        - paragraph [ref=e45]: Viele Themen lassen sich schneller bearbeiten, wenn klar ist, wann wir dazu sprechen, welche Unterlagen vorliegen und welcher Ansprechpartner zuständig ist. Deshalb werden einige Abläufe gebündelt und bestimmte Spezialthemen an erfahrene Kooperationspartner übergeben.
        - paragraph [ref=e46]: Laufende Anfragen werden selbstverständlich weiterhin bearbeitet. Angeforderte Unterlagen werden direkt an die Gesellschaften weitergeleitet und Du wirst in Kopie gesetzt.
